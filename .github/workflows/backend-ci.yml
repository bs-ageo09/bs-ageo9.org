name: backend-ci

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'tsconfig.backend.json'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'tsconfig.backend.json'
      - '.github/workflows/backend-ci.yml'

jobs:
  ci:
    name: lint & typecheck (backend)
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: setup node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: install
      run: npm ci

    - name: lint
      run: npm run lint:backend

    - name: typecheck (backend)
      run: npm run typecheck:backend

    - name: build (bundle for GAS)
      run: npm run build:backend
