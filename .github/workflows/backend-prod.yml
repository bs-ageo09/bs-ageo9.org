name: clasp

env:
  CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
  DEPLOYMENT: ${{ secrets.PROD_DEPLOYMENT }}
  SCRIPT_ID: ${{ secrets.PROD_SCRIPT_ID }}

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - '.clasp.json'
      - '.github/workflows/backend-prod.yml'

jobs:
  deploy:
    name: deploy-clasp
    runs-on: ubuntu-latest
    # dependabot起因の実行はsecretsを参照できずデプロイも不要なため除外する
    if: github.actor != 'dependabot[bot]'

    steps:

    - name: checkout
      uses: actions/checkout@v4

    - name: setup node.js
      uses: actions/setup-node@v4

    - name: install clasp
      run: npm i @google/clasp@2 -g

    - name: setup clasprc
      run: |
        echo ${CLASPRC_JSON} > ~/.clasprc.json

    - name: sed script id
      run: |
        sed -i -e "s/<SCRIPT_ID>/$SCRIPT_ID/" ./.clasp.json

    - name: push
      run: clasp push --force

    - name: deploy
      run: clasp deploy -i ${DEPLOYMENT}
