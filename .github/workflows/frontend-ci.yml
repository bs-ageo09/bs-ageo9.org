name: frontend-ci

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'backend/**'
  pull_request:
    paths-ignore:
      - 'backend/**'

jobs:
  ci:
    name: lint & typecheck & build
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v7

    - name: setup node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: npm

    - name: install
      run: npm ci

    - name: lint
      run: npm run lint:app

    - name: typecheck
      run: npm run typecheck

    - name: generate
      run: npm run generate
